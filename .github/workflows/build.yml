name: Build & Release

on:
  push:
    branches: [ main ]
    paths:
      - 'messenger_allInOne*.py'  # py 파일 변경시만 실행

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install ttkbootstrap pyautogui pyperclip pygetwindow pillow pytesseract pywin32 openpyxl requests certifi

      - name: Get version from py file
        id: get_version
        shell: python
        run: |
          import re, os
          with open(r"${{ github.workspace }}/messenger_allInOne_v1.60.py", encoding="utf-8") as f:
              content = f.read()
          match = re.search(r'^APP_VERSION\s*=\s*["\']([^"\']+)["\']', content, re.MULTILINE)
          version = match.group(1) if match else "0.0.0"
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")
          print(f"Version: {version}")

      - name: Build exe
        run: |
          pyinstaller messenger_v160.spec --clean
        
      - name: Upload exe to repo
        shell: python
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          import os, base64, json
          import urllib.request, urllib.error

          token   = os.environ["GITHUB_TOKEN"]
          version = os.environ["VERSION"]
          repo    = "${{ github.repository }}"
          exe_path = r"dist\메신저올인원\메신저올인원.exe"

          # exe 파일 읽기
          with open(exe_path, "rb") as f:
              content = base64.b64encode(f.read()).decode()

          headers = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json",
              "Content-Type": "application/json",
              "User-Agent": "GitHub-Actions"
          }

          api_base = f"https://api.github.com/repos/{repo}/contents"

          # 기존 파일 SHA 조회
          def get_sha(path):
              try:
                  req = urllib.request.Request(f"{api_base}/{path}", headers=headers)
                  with urllib.request.urlopen(req) as r:
                      return json.loads(r.read())["sha"]
              except:
                  return None

          # exe 업로드
          exe_sha = get_sha("%EB%A9%94%EC%8B%A0%EC%A0%80%EC%98%AC%EC%9D%B8%EC%9B%90.exe")
          body = {"message": f"build: v{version} exe", "content": content}
          if exe_sha:
              body["sha"] = exe_sha
          req = urllib.request.Request(
              f"{api_base}/%EB%A9%94%EC%8B%A0%EC%A0%80%EC%98%AC%EC%9D%B8%EC%9B%90.exe",
              data=json.dumps(body).encode(),
              headers=headers,
              method="PUT"
          )
          with urllib.request.urlopen(req) as r:
              print("exe 업로드 완료:", r.status)

          # version.json 업데이트
          version_json = json.dumps({
              "version": version,
              "download_url": f"https://github.com/{repo}/raw/main/%EB%A9%94%EC%8B%A0%EC%A0%80%EC%98%AC%EC%9D%B8%EC%9B%90.exe",
              "md5": "",
              "updated_at": "${{ github.event.head_commit.timestamp }}"
          }, ensure_ascii=False, indent=2)

          ver_sha = get_sha("version.json")
          body2 = {
              "message": f"release: v{version}",
              "content": base64.b64encode(version_json.encode()).decode()
          }
          if ver_sha:
              body2["sha"] = ver_sha
          req2 = urllib.request.Request(
              f"{api_base}/version.json",
              data=json.dumps(body2).encode(),
              headers=headers,
              method="PUT"
          )
          with urllib.request.urlopen(req2) as r:
              print("version.json 업데이트 완료:", r.status)
